apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  microservices-monitor.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "HTTP Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisLabel": "req/s",
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "rate(http_server_requests_seconds_count{application=\"product-service\"}[1m])",
              "legendFormat": "product-service {{method}} {{uri}} {{status}}",
              "refId": "A"
            },
            {
              "expr": "rate(http_server_requests_seconds_count{application=\"order-service\"}[1m])",
              "legendFormat": "order-service {{method}} {{uri}} {{status}}",
              "refId": "B"
            },
            {
              "expr": "rate(http_server_requests_seconds_count{application=\"api-gateway\"}[1m])",
              "legendFormat": "api-gateway {{method}} {{uri}} {{status}}",
              "refId": "C"
            }
          ]
        },
        {
          "title": "HTTP Average Response Time (ms)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisLabel": "ms",
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              },
              "unit": "ms"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "rate(http_server_requests_seconds_sum{application=\"product-service\"}[1m]) / rate(http_server_requests_seconds_count{application=\"product-service\"}[1m]) * 1000",
              "legendFormat": "product-service {{method}} {{uri}}",
              "refId": "A"
            },
            {
              "expr": "rate(http_server_requests_seconds_sum{application=\"order-service\"}[1m]) / rate(http_server_requests_seconds_count{application=\"order-service\"}[1m]) * 1000",
              "legendFormat": "order-service {{method}} {{uri}}",
              "refId": "B"
            },
            {
              "expr": "rate(http_server_requests_seconds_sum{application=\"api-gateway\"}[1m]) / rate(http_server_requests_seconds_count{application=\"api-gateway\"}[1m]) * 1000",
              "legendFormat": "api-gateway {{method}} {{uri}}",
              "refId": "C"
            }
          ]
        },
        {
          "title": "HTTP 5xx Error Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisLabel": "errors/s",
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "rate(http_server_requests_seconds_count{application=\"product-service\", status=~\"5..\"}[1m])",
              "legendFormat": "product-service 5xx",
              "refId": "A"
            },
            {
              "expr": "rate(http_server_requests_seconds_count{application=\"order-service\", status=~\"5..\"}[1m])",
              "legendFormat": "order-service 5xx",
              "refId": "B"
            },
            {
              "expr": "rate(http_server_requests_seconds_count{application=\"api-gateway\", status=~\"5..\"}[1m])",
              "legendFormat": "api-gateway 5xx",
              "refId": "C"
            }
          ]
        },
        {
          "title": "JVM Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              },
              "unit": "bytes"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(jvm_memory_used_bytes{application=\"product-service\"}) by (area)",
              "legendFormat": "product-service {{area}}",
              "refId": "A"
            },
            {
              "expr": "sum(jvm_memory_used_bytes{application=\"order-service\"}) by (area)",
              "legendFormat": "order-service {{area}}",
              "refId": "B"
            },
            {
              "expr": "sum(jvm_memory_used_bytes{application=\"api-gateway\"}) by (area)",
              "legendFormat": "api-gateway {{area}}",
              "refId": "C"
            }
          ]
        },
        {
          "title": "Active Threads",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisLabel": "threads",
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              },
              "unit": "short"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "jvm_threads_live_threads{application=\"product-service\"}",
              "legendFormat": "product-service",
              "refId": "A"
            },
            {
              "expr": "jvm_threads_live_threads{application=\"order-service\"}",
              "legendFormat": "order-service",
              "refId": "B"
            },
            {
              "expr": "jvm_threads_live_threads{application=\"api-gateway\"}",
              "legendFormat": "api-gateway",
              "refId": "C"
            }
          ]
        },
        {
          "title": "Pod Up/Down Status",
          "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "mappings": [
                { "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } }, "type": "value" }
              ]
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "up{job=\"product-service\"}",
              "legendFormat": "product-service",
              "refId": "A"
            },
            {
              "expr": "up{job=\"order-service\"}",
              "legendFormat": "order-service",
              "refId": "B"
            },
            {
              "expr": "up{job=\"api-gateway\"}",
              "legendFormat": "api-gateway",
              "refId": "C"
            }
          ]
        }
      ],
      "schemaVersion": 38,
      "tags": ["microservices", "spring-boot", "prometheus"],
      "templating": { "list": [] },
      "time": { "from": "now-15m", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Microservices Monitor",
      "uid": "microservices-monitor",
      "version": 1
    }

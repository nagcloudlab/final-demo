server:
  port: 8080

spring:
  application:
    name: api-gateway

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: api-gateway
  health:
    circuitbreakers:
      enabled: true

product:
  service:
    url: ${PRODUCT_SERVICE_URL:http://localhost:8081}

order:
  service:
    url: ${ORDER_SERVICE_URL:http://localhost:8082}

resilience4j:
  circuitbreaker:
    instances:
      productService:
        registerHealthIndicator: true
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 2
        slidingWindowType: COUNT_BASED
      orderService:
        registerHealthIndicator: true
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 2
        slidingWindowType: COUNT_BASED
  retry:
    instances:
      productService:
        maxAttempts: 3
        waitDuration: 1s
      orderService:
        maxAttempts: 3
        waitDuration: 1s

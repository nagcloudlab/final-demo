apiVersion: chaos-mesh.org/v1alpha1
kind: HTTPChaos
metadata:
  name: http-500-product-service
  namespace: microservices
spec:
  mode: all
  selector:
    namespaces:
      - microservices
    labelSelectors:
      app: product-service
  target: Request
  port: 8081
  path: /api/products
  method: GET
  abort: false
  code: 500
  duration: "30s"

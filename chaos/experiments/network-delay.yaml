apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: network-delay-product-service
  namespace: microservices
spec:
  action: delay
  mode: all
  selector:
    namespaces:
      - microservices
    labelSelectors:
      app: product-service
  delay:
    latency: "500ms"
    correlation: "50"
    jitter: "100ms"
  duration: "60s"
